name: Sync fonts to GCS

on:
  push:
    branches:
      - main
    paths:
      - 'fonts/**'
  workflow_dispatch:

permissions: {}

jobs:
  sync-fonts-to-gcs:
    if: github.repository == 'chainguard-dev/courses-theme'

    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Github Actions Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Authenticate to Google Cloud
        id: auth
        uses: step-security/google-github-auth@775fc4c80760272ef389c9f9f8d98de7db0c170d # v3.0.2
        with:
          service_account: "github-chainguard-academy@chainguard-academy.iam.gserviceaccount.com"
          workload_identity_provider: "projects/456977358484/locations/global/workloadIdentityPools/chainguard-academy/providers/chainguard-edu"

      - name: Setup G Cloud SDK
        uses: 'google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db' # v3.0.1

      - name: Sync fonts directory to GCS
        run: gsutil -m rsync -r -d fonts/ gs://chainguard-courses-theme/fonts/
